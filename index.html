<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問合せ・見積依頼 管理｜GOURIKI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0d0f14;--surface:#161920;--surface2:#1e2230;--border:#2a2f3f;--accent:#4f7cff;--accent2:#00c9a7;--accent3:#ff6b6b;--accent4:#ffd166;--text:#e8eaf2;--muted:#7a8099;--dim:#4a5168}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.h-title{font-size:14px;font-weight:700}
.tag{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px}
.year-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.h-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.month-tabs{display:flex;gap:2px}
.mtab{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;transition:all .15s;white-space:nowrap}
.mtab:hover{border-color:var(--accent);color:var(--accent)}
.mtab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mtab.y25.active{background:#6e56cf;border-color:#6e56cf}

/* UPLOAD ZONE */
.upload-zone{background:var(--surface);border:2px dashed var(--border);border-radius:8px;padding:12px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;margin:0 4px}
.upload-zone:hover{border-color:var(--accent);background:rgba(79,124,255,.05)}
.upload-zone.drag{border-color:var(--accent2);background:rgba(0,201,167,.08)}
.upload-zone label{cursor:pointer;font-size:11px;color:var(--muted)}
.upload-zone .icon{font-size:18px}
.upload-zone input{display:none}
.upload-status{font-size:11px;color:var(--accent2);font-weight:600}

/* TABS */
.view-tabs{display:flex;gap:0;background:var(--surface2);border-radius:6px;padding:2px}
.vtab{padding:5px 14px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.vtab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:200px 1fr;height:calc(100vh - 57px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.sb-sec h3{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--dim);text-transform:uppercase;margin-bottom:7px}

/* KPI */
.kpi-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px}
.kpi-label{font-size:9px;color:var(--muted);margin-bottom:2px}
.kpi-value{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600}
.kpi-value span{font-size:11px;font-weight:400;color:var(--muted)}
.kpi-sub{font-size:9px;color:var(--muted);margin-top:2px}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}

/* MONTHLY SUMMARY SIDEBAR */
.month-summary-list{display:flex;flex-direction:column;gap:3px}
.ms-row{display:flex;align-items:center;justify-content:space-between;padding:4px 7px;border-radius:4px;font-size:11px;cursor:pointer;transition:background .1s}
.ms-row:hover{background:var(--surface2)}
.ms-row.active{background:var(--surface2);border-left:2px solid var(--accent)}
.ms-label{color:var(--muted);font-size:10px}
.ms-cnt{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text)}
.ms-bar-wrap{height:3px;background:var(--border);border-radius:2px;flex:1;margin:0 8px}
.ms-bar{height:100%;border-radius:2px;background:var(--accent)}

/* FILTERS */
.filter-group{display:flex;flex-direction:column;gap:2px}
.fbtn{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:4px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:11px;text-align:left;transition:all .15s}
.fbtn:hover{background:var(--surface2);color:var(--text)}
.fbtn.active{background:var(--surface2);color:var(--text);border-left:2px solid var(--accent)}
.fbtn .cnt{font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--bg);padding:0 5px;border-radius:8px;color:var(--muted)}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:6px 9px 6px 26px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:11px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap::before{content:'🔍';position:absolute;left:7px;top:50%;transform:translateY(-50%);font-size:10px;opacity:.4}

/* MAIN */
.main{overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tbar-title{font-size:16px;font-weight:700}
.tbar-cnt{font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:10px}
.tbar-right{margin-left:auto;display:flex;gap:6px}
.btn{padding:5px 12px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{opacity:.85;color:#fff}
.btn.green{background:var(--accent2);border-color:var(--accent2);color:#000}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface2)}
thead th{padding:8px 11px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--muted)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody tr.sel{background:rgba(79,124,255,.08)}
td{padding:8px 11px;vertical-align:middle;font-size:12px}
td.num-c{font-family:'IBM Plex Mono',monospace;color:var(--muted);font-size:11px;white-space:nowrap}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700}
.b-済{background:rgba(0,201,167,.15);color:#00c9a7}
.b-pending{background:rgba(255,209,102,.15);color:#ffd166}
.b-new{background:rgba(79,124,255,.15);color:#4f7cff}
.p-chip{display:inline-block;padding:2px 6px;border-radius:3px;font-size:11px;font-weight:500}
.p0{background:rgba(255,107,107,.15);color:#ff6b6b}
.p1{background:rgba(79,124,255,.15);color:#7fa3ff}
.p2{background:rgba(0,201,167,.15);color:#00c9a7}
.p3{background:rgba(255,209,102,.15);color:#ffd166}
.p4{background:rgba(150,150,180,.15);color:#9696b4}
.pref-c{display:inline-block;font-size:10px;padding:1px 5px;background:rgba(79,124,255,.08);border:1px solid rgba(79,124,255,.2);border-radius:3px;color:#7fa3ff;white-space:nowrap}
.sd-c{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 5px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--muted)}
.empty{text-align:center;padding:40px 20px;color:var(--dim)}

/* SCHEDULE TABLE */
.sch-type{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
.s-理事会{background:rgba(79,124,255,.15);color:#7fa3ff}
.s-総会{background:rgba(255,107,107,.15);color:#ff6b6b}
.s-工事説明会{background:rgba(0,201,167,.15);color:#00c9a7}
.s-住民説明会{background:rgba(255,209,102,.15);color:#ffd166}
.s-other{background:rgba(150,150,180,.15);color:#9696b4}

/* SUMMARY GRID */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:4px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.sum-card-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.sum-big{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:var(--text)}
.sum-big span{font-size:13px;color:var(--muted);font-weight:400}
.sum-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* DETAIL PANEL */
.detail-panel{position:fixed;right:0;top:57px;bottom:0;width:320px;background:var(--surface);border-left:1px solid var(--border);padding:20px;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:50;overflow-y:auto}
.detail-panel.open{transform:translateX(0)}
.dp-close{position:absolute;top:12px;right:12px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;border-radius:4px;padding:3px 9px;font-size:11px;font-family:'Noto Sans JP',sans-serif}
.dp-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-bottom:4px}
.dp-name{font-size:16px;font-weight:700;margin-bottom:3px;line-height:1.3}
.dp-pref{font-size:11px;color:#7fa3ff;margin-bottom:10px}
.dp-row{display:flex;align-items:baseline;gap:7px;padding:6px 0;border-bottom:1px solid var(--border)}
.dp-row:last-child{border-bottom:none}
.dp-key{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);width:55px;flex-shrink:0}
.dp-val{color:var(--text);font-size:12px}
.stat-btns{display:flex;gap:5px;margin-top:10px}
.sbtn{flex:1;padding:6px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.sbtn.a-済{background:rgba(0,201,167,.2);border-color:#00c9a7;color:#00c9a7}
.sbtn.a-対{background:rgba(255,209,102,.2);border-color:#ffd166;color:#ffd166}
.notes-box{margin-top:12px;padding:10px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)}
.notes-box label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--dim);display:block;margin-bottom:6px;text-transform:uppercase}
.notes-box textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:11px;resize:vertical;outline:none;min-height:70px}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;width:480px;max-width:95vw}
.modal h2{font-size:14px;font-weight:700;margin-bottom:16px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg-item{display:flex;flex-direction:column;gap:3px}
.fg-item.full{grid-column:span 2}
.fg-item label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--dim);text-transform:uppercase}
.fg-item input,.fg-item select{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:7px 9px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;outline:none;transition:border-color .15s}
.fg-item input:focus,.fg-item select:focus{border-color:var(--accent)}
.fg-item select option{background:var(--surface2)}
.mf{display:flex;justify-content:flex-end;gap:6px;margin-top:16px}

.hp-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:5px;border-bottom:1px solid var(--border);font-size:12px}
.hp-row:last-child{border-bottom:none}
.hp-row:hover{background:var(--surface2)}
.hp-tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;background:rgba(255,209,102,.2);color:#ffd166;white-space:nowrap}

/* ============================================================
   モバイル対応
   ============================================================ */
@media (max-width: 768px) {
  /* ヘッダー */
  header{flex-wrap:wrap;gap:6px;padding:8px 10px}
  .upload-zone{width:100%;order:3}
  .h-right{width:100%;order:4;flex-direction:column;gap:6px;margin-left:0}
  .view-tabs{width:100%}
  .vtab{flex:1;font-size:11px;padding:6px 4px}
  .month-tabs{width:100%;overflow-x:auto;padding-bottom:2px}
  .mtab{font-size:10px;padding:4px 8px}
  #hpBanner{width:100%;order:2}

  /* レイアウト：サイドバーを非表示→ボトムシート風に */
  .layout{grid-template-columns:1fr;height:auto}
  .sidebar{display:none}

  /* メイン */
  .main{padding:10px;gap:10px}
  .toolbar{flex-wrap:wrap;gap:6px}
  .tbar-title{font-size:13px}
  .tbar-right{width:100%;justify-content:flex-end}

  /* テーブル：横スクロール */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:600px}
  td,th{padding:6px 8px;font-size:11px}

  /* サマリーグリッド */
  .summary-grid{grid-template-columns:1fr 1fr}
  .sum-big{font-size:22px}

  /* 詳細パネル */
  .detail-panel{width:100%;top:auto;bottom:0;height:70vh;transform:translateY(100%);border-radius:16px 16px 0 0;border-left:none;border-top:1px solid var(--border)}
  .detail-panel.open{transform:translateY(0)}

  /* モバイル用フィルターバー */
  .mobile-filter-bar{display:flex;gap:6px;overflow-x:auto;padding:6px 0;-webkit-overflow-scrolling:touch}
  .mobile-filter-bar .fbtn{white-space:nowrap;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:4px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;flex-shrink:0}
  .mobile-filter-bar .fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
}

@media (min-width:769px){
  .mobile-filter-bar{display:none}
}

/* ===== MOBILE / iPhone ===== */
@media (max-width: 768px) {
  header{padding:8px 10px;gap:6px;flex-wrap:wrap}
  .h-title{font-size:13px}
  #hpBanner{padding:5px 10px}
  #hpBanner span[style*="font-size:20px"]{font-size:16px!important}
  .h-right{width:100%;overflow-x:auto;padding-bottom:4px}
  .view-tabs{flex-shrink:0}
  .vtab{padding:4px 10px;font-size:11px}
  .month-tabs{flex-shrink:0}
  .mtab{padding:3px 8px;font-size:10px}
  .upload-zone{padding:6px 10px}
  .upload-zone label{font-size:10px}

  /* サイドバーを上部に移動 */
  .layout{
    display:flex;
    flex-direction:column;
    height:auto;
    min-height:calc(100vh - 100px);
  }
  .sidebar{
    border-right:none;
    border-bottom:1px solid var(--border);
    padding:10px;
    flex-direction:row;
    flex-wrap:wrap;
    gap:10px;
    overflow-y:visible;
  }
  .sb-sec{min-width:140px;flex:1}
  .sb-sec h3{margin-bottom:5px}
  #monthSummarySection{display:none} /* スマホでは非表示 */
  #kpiSection{min-width:100%;order:-1}
  .kpi-card{padding:8px;margin-bottom:4px}
  .kpi-value{font-size:16px}

  /* メイン */
  .main{padding:10px;gap:10px}
  .toolbar{gap:6px}
  .tbar-title{font-size:13px}
  .tbar-right{gap:4px}
  .btn{padding:4px 8px;font-size:10px}

  /* テーブルをスクロール可能に */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:600px}
  thead th{padding:6px 8px;font-size:8px}
  td{padding:6px 8px;font-size:11px}
  .sd-c{font-size:9px}
  .badge{font-size:8px;padding:1px 5px}
  .p-chip{font-size:10px;padding:1px 5px}
  .pref-c{font-size:9px}

  /* 詳細パネル */
  .detail-panel{
    top:auto;
    bottom:0;
    left:0;
    right:0;
    width:100%;
    height:70vh;
    transform:translateY(100%);
    border-left:none;
    border-top:1px solid var(--border);
    border-radius:16px 16px 0 0;
  }
  .detail-panel.open{transform:translateY(0)}

  /* モーダル */
  .modal{width:95vw;padding:16px}
  .fg{grid-template-columns:1fr}
  .fg-item.full{grid-column:span 1}

  /* サマリーグリッド */
  .summary-grid{grid-template-columns:1fr 1fr}

  /* HPバナー */
  #hpCoins{display:none}
}

@media (max-width: 480px) {
  .summary-grid{grid-template-columns:1fr}
  .sidebar{flex-direction:column}
  #personSec,#statusSec,#prefSec{display:none} /* 極小画面ではフィルター非表示 */
}
</style>
</head>
<body>

<header>
  <span class="h-title">📋 問合せ・見積依頼</span>
  <span class="tag">GOURIKI</span>
  <span class="year-chip" id="yearChip">—</span>

  <!-- EXCEL / 画像 UPLOAD -->
  <div class="upload-zone" id="uploadZone">
    <span class="icon">📊</span>
    <label for="xlsxInput">📥 BOXのExcelを読込
      <input type="file" id="xlsxInput" accept=".xlsx,.xls,image/*" multiple>
    </label>
    <span class="upload-status" id="uploadStatus"></span>
  </div>

  <!-- HP問い合わせカウンター -->
  <div id="hpBanner" style="display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(255,209,102,.15),rgba(255,107,107,.1));border:1px solid rgba(255,209,102,.4);border-radius:6px;padding:6px 14px;cursor:pointer" onclick="playCharin(1);showHpList()" title="HP問い合わせ案件を表示">
    <span style="font-size:16px">💻</span>
    <div>
      <div style="font-size:9px;font-weight:700;letter-spacing:.1em;color:rgba(255,209,102,.8);text-transform:uppercase">HP問い合わせ（今月）</div>
      <div style="display:flex;align-items:baseline;gap:4px">
        <span id="hpCount" style="font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;color:#ffd166">—</span>
        <span style="font-size:11px;color:rgba(255,209,102,.6)">件</span>
        <span id="hpCoins" style="font-size:14px;margin-left:2px"></span>
      </div>
    </div>
  </div>

  <div class="h-right">
    <div class="view-tabs">
      <button class="vtab active" onclick="switchView('list')">物件リスト</button>
      <button class="vtab" onclick="switchView('schedule')">理事会・総会</button>
      <button class="vtab" onclick="switchView('summary')">月別サマリー</button>
    </div>
    <div class="month-tabs" id="monthTabs"></div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-sec">
      <h3>検索</h3>
      <div class="search-wrap"><input type="text" id="searchInput" placeholder="物件名・担当者・県名..."></div>
    </div>

    <div class="sb-sec" id="kpiSection">
      <h3>集計</h3>
      <div class="kpi-card">
        <div class="kpi-label">総件数（当月）</div>
        <div class="kpi-value" id="kpiTotal">—</div>
        <div class="kpi-sub" id="kpiSub">—</div>
        <div class="prog-bar"><div class="prog-fill" id="kpiProg" style="width:0%"></div></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">理事会・総会（今後）</div>
        <div class="kpi-value" id="kpiSch">—</div>
      </div>
    </div>

    <div class="sb-sec" id="monthSummarySection">
      <h3>月別件数</h3>
      <div class="month-summary-list" id="monthSummaryList"></div>
    </div>

    <div class="sb-sec" id="personSec">
      <h3>担当者</h3>

<script>
// ============================================================
// 月マッピング
// ============================================================
const MY = {'3月':2026,'2月':2026,'1月':2026,'12月':2025,'11月':2025,'10月':2025,'9月':2025,'8月':2025,'7月':2025,'6月':2025,'5月':2025,'4月':2025};
const MONTH_ORDER = ['3月','2月','11月','10月','6月','5月'];

// ============================================================
// 物件データ（初期値 - Excelで上書き可能）
// ============================================================
let records = [];

// ============================================================
// 理事会・総会スケジュール
// ============================================================
let schedules = [];

// ============================================================
// 月別サマリー（ホワイトボード左側の数値）
// ============================================================
let monthlySummary = [];

// ============================================================
// 状態
// ============================================================
let nextId=600, currentMonth='3月', currentView='list';
let fPerson='ALL', fStatus='ALL', fPref='ALL', searchTerm='', sortKey='num', sortDir=1, selectedId=null;

// ============================================================
// Excel読み込み
// ============================================================
function setupUpload(){
  const inp = document.getElementById('xlsxInput');
  const zone = document.getElementById('uploadZone');
  inp.addEventListener('change', e => {
    const files = Array.from(e.target.files);
    files.forEach(f => {
      if(f.type.startsWith('image/')) analyzeImage(f);
      else loadXLSX(f);
    });
  });
  zone.addEventListener('dragover', e => {e.preventDefault(); zone.classList.add('drag');});
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    Array.from(e.dataTransfer.files).forEach(f => {
      if(f.type.startsWith('image/')) analyzeImage(f);
      else loadXLSX(f);
    });
  });
}

async function analyzeImage(file){
  document.getElementById('uploadStatus').textContent = '🔍 AI解析中...';
  const reader = new FileReader();
  reader.onload = async e => {
    const base64 = e.target.result.split(',')[1];
    const mediaType = file.type;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {'Content-Type':'application/json','anthropic-version':'2023-06-01'},
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          messages: [{
            role: 'user',
            content: [
              {type:'image', source:{type:'base64', media_type:mediaType, data:base64}},
              {type:'text', text:`このホワイトボードの問合せ・見積依頼リストを読み取り、以下のJSON形式のみで返してください。余分なテキスト不要。
{"month":"X月","year":2026,"records":[{"num":1,"name":"物件名","prefecture":"東京都","client":"依頼元","sd":"SD6","person":"担当者","status":"対応中","note":""}]}
都道府県は物件名・地名から推測。ステータスは「済」か「対応中」。`}
            ]
          }]
        })
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if(jsonMatch){
        const parsed = JSON.parse(jsonMatch[0]);
        if(parsed.records && parsed.records.length > 0){
          const newRecs = parsed.records.map((r,i) => ({
            id: nextId++, year: parsed.year||2026, month: parsed.month||'3月',
            num: r.num||i+1, name: r.name||'', prefecture: r.prefecture||'',
            client: r.client||'', sd: r.sd||'', person: r.person||'',
            status: r.status||'対応中', note: r.note||''
          }));
          // 同じ月のデータを置き換え
          const mo = parsed.month;
          const yr = parsed.year||2026;
          records = records.filter(r => !(r.month===mo && r.year===yr));
          records = records.concat(newRecs);
          document.getElementById('uploadStatus').textContent = `✓ ${parsed.year}年${parsed.month} ${newRecs.length}件読込`;
          currentMonth = parsed.month;
          render();
        }
      }
    } catch(err){
      document.getElementById('uploadStatus').textContent = '⚠ 解析エラー';
      console.error(err);
    }
  };
  reader.readAsDataURL(file);
}

function loadXLSX(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      
      // シート1: 物件リスト
      const ws1 = wb.Sheets['物件リスト'];
      if(ws1){
        const data = XLSX.utils.sheet_to_json(ws1, {header:1, defval:''});
        const newRecords = [];
        for(let i=2; i<data.length; i++){
          const r = data[i];
          if(!r[3]) continue; // 物件名なし行スキップ
          newRecords.push({
            id: nextId++,
            year: +r[0]||2026, month: String(r[1]||''), num: +r[2]||i-1,
            name: String(r[3]||''), prefecture: String(r[4]||''),
            hp_flag: String(r[5]||''),
            saiken: ['○','〇','✓','o','O'].includes(String(r[6]||'').trim()),
            client: (String(r[5]||'').trim()==='○'?'HP:':'')+String(r[7]||''),
            sd: String(r[8]||''),
            person: String(r[9]||''), status: String(r[10]||'対応中'),
            note: String(r[11]||'')
          });
        }
        if(newRecords.length > 0){
          records = newRecords;
          document.getElementById('uploadStatus').textContent = `✓ ${newRecords.length}件読込`;
        }
      }

      // シート2: 理事会・総会
      const ws2 = wb.Sheets['理事会・総会スケジュール'];
      if(ws2){
        const data2 = XLSX.utils.sheet_to_json(ws2, {header:1, defval:''});
        const newSch = [];
        for(let i=2; i<data2.length; i++){
          const r = data2[i];
          if(!r[0]) continue;
          newSch.push({date:String(r[0]),name:String(r[1]||''),time:String(r[2]||''),type:String(r[3]||''),person:String(r[4]||''),note:String(r[5]||''),sd:String(r[6]||'')});
        }
        if(newSch.length > 0) schedules = newSch;
      }

      // シート3: 月別サマリー
      const ws3 = wb.Sheets['月別サマリー'];
      if(ws3){
        const data3 = XLSX.utils.sheet_to_json(ws3, {header:1, defval:''});
        const newSum = [];
        for(let i=2; i<data3.length; i++){
          const r = data3[i];
          if(!r[1]) continue;
          newSum.push({year:+r[0]||2025,month:String(r[1]),count:r[2]||null,kaigi:r[3]||null,kobemag:String(r[4]||''),nashiji:String(r[5]||''),note:String(r[6]||'')});
        }
        if(newSum.length > 0) monthlySummary = newSum;
      }

      render();
    } catch(err){
      document.getElementById('uploadStatus').textContent = '⚠ 読込エラー';
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ============================================================
// VIEW切替
// ============================================================
function switchView(v){
  currentView = v;
  document.querySelectorAll('.vtab').forEach((t,i)=>t.classList.toggle('active',['list','schedule','summary'][i]===v));
  document.getElementById('viewList').style.display = v==='list'?'flex':'none';
  document.getElementById('viewList').style.flexDirection = 'column';
  document.getElementById('viewList').style.gap = '12px';
  document.getElementById('viewSchedule').style.display = v==='schedule'?'flex':'none';
  document.getElementById('viewSchedule').style.flexDirection = 'column';
  document.getElementById('viewSchedule').style.gap = '12px';
  document.getElementById('viewSummary').style.display = v==='summary'?'flex':'none';
  document.getElementById('viewSummary').style.flexDirection = 'column';
  document.getElementById('viewSummary').style.gap = '12px';
  // month tabs only for list
  document.getElementById('monthTabs').style.display = v==='list'?'flex':'none';
  render();
}

// ============================================================
// RENDER
// ============================================================
function getFiltered(){
  return records.filter(r=>{
    if(r.month!==currentMonth) return false;
    if(fPerson!=='ALL'&&!r.person.includes(fPerson)) return false;
    if(fStatus!=='ALL'&&r.status!==fStatus) return false;
    if(fPref!=='ALL'&&r.prefecture!==fPref) return false;
    if(searchTerm&&![r.name,r.person,r.client,r.prefecture].some(s=>(s||'').includes(searchTerm))) return false;
    return true;
  }).sort((a,b)=>{
    let av=a[sortKey],bv=b[sortKey];
    if(sortKey==='num'){av=+av||0;bv=+bv||0;}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
}
function pc(p){if(!p)return'p4';if(p.includes('森下'))return'p0';if(p.includes('小林'))return'p1';if(p.includes('井上'))return'p2';if(p.includes('中村'))return'p3';return'p4';}

function render(){
  const year = MY[currentMonth]||2026;
  document.getElementById('yearChip').textContent = year+'年';

  // Month tabs
  document.getElementById('monthTabs').innerHTML = MONTH_ORDER.map(m=>{
    const y=MY[m]||2026;
    return`<button class="mtab${m===currentMonth?' active':''}${y===2025?' y25':''}" onclick="setMonth('${m}')">${m}</button>`;
  }).join('');

  const mr = records.filter(r=>r.month===currentMonth);
  const zumi = mr.filter(r=>r.status==='済').length;
  document.getElementById('kpiTotal').innerHTML = mr.length+'<span>件</span>';
  document.getElementById('kpiSub').textContent = `済 ${zumi} / 残 ${mr.length-zumi}`;
  document.getElementById('kpiProg').style.width = mr.length?(zumi/mr.length*100)+'%':'0%';
  document.getElementById('kpiSch').innerHTML = schedules.length+'<span>件</span>';

  // Month summary sidebar
  const maxCnt = Math.max(...monthlySummary.filter(s=>s.count).map(s=>s.count));
  document.getElementById('monthSummaryList').innerHTML = monthlySummary.filter(s=>s.count).slice(-10).map(s=>`
    <div class="ms-row${s.month===currentMonth&&s.year===year?' active':''}" onclick="setMonth('${s.month}')">
      <span class="ms-label">${s.year%100}/${s.month}</span>
      <div class="ms-bar-wrap"><div class="ms-bar" style="width:${(s.count/maxCnt*100).toFixed(0)}%"></div></div>
      <span class="ms-cnt">${s.count}</span>
    </div>`).join('');

  // Person filter
  document.getElementById('personFilter').innerHTML = ['ALL','森下','小林','井上','中村'].map(p=>{
    const cnt=p==='ALL'?mr.length:mr.filter(r=>r.person.includes(p)).length;
    return`<button class="fbtn${fPerson===p?' active':''}" onclick="setPerson('${p}')">${p==='ALL'?'すべて':p}<span class="cnt">${cnt}</span></button>`;
  }).join('');

  // Status filter
  document.getElementById('statusFilter').innerHTML = ['ALL','対応中','済','新規'].map(s=>{
    const cnt=s==='ALL'?mr.length:mr.filter(r=>r.status===s).length;
    return`<button class="fbtn${fStatus===s?' active':''}" onclick="setFStatus('${s}')">${s==='ALL'?'すべて':s}<span class="cnt">${cnt}</span></button>`;
  }).join('');

  // Pref filter
  const pc2={};mr.forEach(r=>{if(r.prefecture)pc2[r.prefecture]=(pc2[r.prefecture]||0)+1;});
  document.getElementById('prefFilter').innerHTML = [['ALL','すべて'],...Object.entries(pc2).sort((a,b)=>b[1]-a[1]).slice(0,7).map(e=>[e[0],e[0]])].map(([v,l])=>{
    const cnt=v==='ALL'?mr.length:mr.filter(r=>r.prefecture===v).length;
    return`<button class="fbtn${fPref===v?' active':''}" onclick="setPref('${v}')">${l}<span class="cnt">${cnt}</span></button>`;
  }).join('');

  if(currentView==='list') renderList();
  else if(currentView==='schedule') renderSchedule();
  else renderSummary();
  updateHpCounter();
}

function renderList(){
  const filtered = getFiltered();
  document.getElementById('toolbarTitle').textContent = `${MY[currentMonth]||2026}年${currentMonth} 問合せ・見積依頼`;
  document.getElementById('toolbarCount').textContent = filtered.length+'件';
  const tbody=document.getElementById('tableBody');
  const empty=document.getElementById('emptyMsg');
  if(!filtered.length){
    tbody.innerHTML='';
    empty.style.display='block';
    empty.innerHTML = records.length===0
      ? '📥 上部の「Excel または 画像を読込」からBOXのExcelファイルを読み込んでください'
      : '📭 該当する案件がありません';
    return;
  }
  empty.style.display='none';
  tbody.innerHTML=filtered.map(r=>{
    const sb = r.status==='済'
      ? '<span class="badge b-済">済</span>'
      : r.status==='新規'
      ? '<span class="badge b-new">新規</span>'
      : '<span class="badge b-pending">対応中</span>';
    const pref = r.prefecture
      ? `<span class="pref-c">${r.prefecture}</span>`
      : '<span style="color:var(--dim)">—</span>';
    const hp = isHpClient(r.client, r.name);
    const re = isReSaiken(r.name, r.saiken);
    const hpBadge = hp
      ? `<span onclick="event.stopPropagation();playCharin(1)" style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;background:rgba(255,209,102,.2);color:#ffd166;border:1px solid rgba(255,209,102,.35);cursor:pointer;user-select:none" title="チャリーン🪙">HP 🪙</span>`
      : '';
    const reBadge = re
      ? '<span style="display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;background:rgba(160,120,255,.2);color:#c084fc;border:1px solid rgba(160,120,255,.35)">再見積</span>'
      : '';
    const clientLabel = hp
      ? (r.client||'').replace(/^HP:?/i,'').trim() || '直接'
      : (r.client||'—');
    const rowBorder = re ? 'border-left:3px solid rgba(160,120,255,.4)' : '';
    return `<tr class="${r.id===selectedId?'sel':''}" style="${rowBorder}" onclick="selectRow(${r.id})">
      <td class="num-c">${String(r.num).padStart(2,'0')}</td>
      <td style="font-weight:500">${r.name}</td>
      <td>${pref}</td>
      <td>${hpBadge}</td>
      <td>${reBadge}</td>
      <td style="color:var(--muted);font-size:11px">${clientLabel}</td>
      <td><span class="sd-c">${r.sd||'—'}</span></td>
      <td><span class="p-chip ${pc(r.person)}">${r.person||'—'}</span></td>
      <td>${sb}</td>
      <td style="color:var(--muted);font-size:10px">${r.note||''}</td>
    </tr>`;
  }).join('');
}

function renderSchedule(){
  const typeClass = t => {
    if(t.includes('理事会')) return 's-理事会';
    if(t.includes('総会')) return 's-総会';
    if(t.includes('工事説明')) return 's-工事説明会';
    if(t.includes('住民説明')) return 's-住民説明会';
    return 's-other';
  };

  // 日付文字列をDateに変換（例: "2026/3/15(日)"）
  const parseDate = str => {
    const m = str.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
    return m ? new Date(+m[1], +m[2]-1, +m[3]) : new Date(9999,0,1);
  };

  // 今週末（土曜・日曜）の判定
  const today = new Date(2026, 2, 11); // 2026/3/11 (水)
  const dayOfWeek = today.getDay(); // 3=水
  const thisSat = new Date(today); thisSat.setDate(today.getDate() + (6 - dayOfWeek));
  const thisSun = new Date(today); thisSun.setDate(today.getDate() + (7 - dayOfWeek));
  const isThisWeekend = d => {
    return (d.getFullYear()===thisSat.getFullYear() && d.getMonth()===thisSat.getMonth() && d.getDate()===thisSat.getDate()) ||
           (d.getFullYear()===thisSun.getFullYear() && d.getMonth()===thisSun.getMonth() && d.getDate()===thisSun.getDate());
  };
  const isPast = d => d < today;

  // 新しい順にソート
  const sorted = [...schedules].sort((a,b) => parseDate(b.date) - parseDate(a.date));

  document.getElementById('schCount').textContent = sorted.length+'件';
  const empty=document.getElementById('schEmpty');
  const tbody=document.getElementById('schBody');
  if(!sorted.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  tbody.innerHTML = sorted.map(s=>{
    const d = parseDate(s.date);
    const weekend = isThisWeekend(d);
    const past = isPast(d);
    const rowStyle = weekend
      ? 'background:rgba(255,209,102,.08);border-left:3px solid #ffd166;'
      : past ? 'opacity:.55;' : '';
    const dateMark = weekend ? '🔔 ' : '';
    const dateStyle = weekend
      ? 'font-weight:700;color:#ffd166;'
      : past ? 'color:var(--dim);' : 'color:var(--muted);';
    return`<tr style="${rowStyle}">
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;white-space:nowrap;${dateStyle}">${dateMark}${s.date}</td>
      <td style="font-weight:500">${s.name}</td>
      <td style="color:var(--muted);font-size:11px">${s.time}</td>
      <td><span class="sch-type ${typeClass(s.type)}">${s.type}</span></td>
      <td><span class="p-chip ${pc(s.person)}">${s.person||'—'}</span></td>
      <td style="color:var(--muted);font-size:11px">${s.note||''}</td>
      <td><span class="sd-c">${s.sd||'—'}</span></td>
    </tr>`;
  }).join('');
}


function renderSummary(){
  const getPeriod = (year, month) => {
    const m = parseInt(month);
    const periodStart = m >= 4 ? year : year - 1;
    const BASE_YEAR = 1994;
    return periodStart - BASE_YEAR;
  };

  const CURRENT_YEAR = 2026;
  const CURRENT_MONTH = '3月';

  const merged = monthlySummary.map(s => {
    const isCurrent = s.year === CURRENT_YEAR && s.month === CURRENT_MONTH;
    const period = getPeriod(s.year, s.month);
    if(isCurrent){
      const live = records.filter(r => r.year === s.year && r.month === s.month).length;
      return {...s, isLive: true, count: live, period};
    }
    return {...s, isLive: false, period};
  });

  const maxC = Math.max(...merged.filter(s=>s.count).map(s=>s.count));
  const totalAll = merged.reduce((a,s)=>a+(s.count||0),0);
  const total26 = merged.filter(s=>s.year===2026).reduce((a,s)=>a+(s.count||0),0);
  const topMonth = merged.find(s=>s.count===maxC)||{};

  document.getElementById('summaryCards').innerHTML = `
    <div class="sum-card"><div class="sum-card-title">累計件数（全期間）</div><div class="sum-big">${totalAll}<span>件</span></div><div class="sum-sub">今月はLIVE集計、過去月はホワイトボード値</div></div>
    <div class="sum-card"><div class="sum-card-title">2026年 合計（31期）</div><div class="sum-big">${total26}<span>件</span></div></div>
    <div class="sum-card"><div class="sum-card-title">最多月</div><div class="sum-big">${maxC}<span>件</span></div><div class="sum-sub">${topMonth.month||''}（${topMonth.year||''}）</div></div>
    <div class="sum-card"><div class="sum-card-title">理事会・総会</div><div class="sum-big">${schedules.length}<span>件</span></div><div class="sum-sub">登録スケジュール数</div></div>
  `;

  document.getElementById('summaryBody').innerHTML = [...merged].reverse().map(s=>{
    const liveBadge = s.isLive ? '<span style="font-size:9px;font-weight:700;color:var(--accent2);margin-left:4px">● LIVE</span>' : '';
    const barColor = s.isLive ? 'var(--accent2)' : 'var(--accent)';
    const textColor = s.isLive ? 'var(--accent2)' : 'var(--accent)';
    const bar = s.count
      ? `<div style="display:flex;align-items:center;gap:6px"><strong style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:${textColor}">${s.count}</strong>${liveBadge}<div style="height:4px;width:${(s.count/maxC*80).toFixed(0)}px;background:${barColor};border-radius:2px;display:inline-block;opacity:.8"></div></div>`
      : '—';
    const periodBadge = `<span style="display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;background:rgba(110,86,207,.15);color:#a78bfa">第${s.period}期</span>`;
    return`<tr style="${s.isLive?'background:rgba(0,201,167,.04)':''}">
      <td>${periodBadge}</td>
      <td style="color:var(--muted);font-size:11px">${s.year}</td>
      <td style="font-weight:600">${s.month}</td>
      <td>${bar}</td>
      <td style="color:var(--muted)">${s.kaigi||'—'}</td>
      <td style="font-size:11px">${s.kobemag||''}</td>
      <td style="font-size:11px">${s.nashiji||''}</td>
      <td style="color:var(--muted);font-size:11px">${s.note||''}</td>
    </tr>`;
  }).join('');
}

  const year = MY[currentMonth]||2026;

  // --- 全月分を1シートに ---
  const allData = [
    ['年','月','#','物件名','都道府県','HP','再見積','依頼元','SD台数','担当者','ステータス','メモ・備考']
  ];
  const monthOrder = ['3月','2月','11月','10月','6月','5月'];
  monthOrder.forEach(mo => {
    const yr = MY[mo]||2026;
    records.filter(r=>r.month===mo&&r.year===yr).sort((a,b)=>a.num-b.num).forEach(r=>{
      allData.push([
        r.year, r.month, r.num, r.name, r.prefecture||'',
        isHpClient(r.client,r.name)?'○':'',
        r.saiken?'○':'',
        isHpClient(r.client,r.name)?(r.client||'').replace(/^HP:?/i,'').trim():r.client||'',
        r.sd||'', r.person||'', r.status||'', r.note||''
      ]);
    });
  });
  const ws = XLSX.utils.aoa_to_sheet(allData);
  ws['!cols'] = [6,6,5,40,10,6,7,22,12,10,8,28].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws, '物件リスト');

  // --- 理事会・総会シート ---
  const schData = [['日付','物件名','時刻','種別','担当者','備考','SD']];
  schedules.forEach(s=>schData.push([s.date,s.name,s.time,s.type,s.person,s.note,s.sd]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(schData), '理事会・総会スケジュール');

  // --- 月別サマリーシート ---
  const sumData = [['年','月','問合せ件数','理事会・総会','在庫KOBEMAG','在庫梨地','備考']];
  monthlySummary.forEach(s=>sumData.push([s.year,s.month,s.count||'',s.kaigi||'',s.kobemag||'',s.nashiji||'',s.note||'']));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sumData), '月別サマリー');

  const fname = `GOURIKI_物件管理_${year}年${currentMonth}.xlsx`;
  XLSX.writeFile(wb, fname);
}

// ============================================================
let prevHpCount = 0;

function isReSaiken(name, saiken){
  return saiken === true;
}

function isHpClient(client, name){
  const c = (client||'').toUpperCase();
  const n = (name||'').toUpperCase();
  return c.startsWith('HP') || n.includes('(HP)') || n.includes('（HP）');
}

function updateHpCounter(){
  const yr = MY[currentMonth]||2026;
  const hpRecs = records.filter(r => r.year===yr && r.month===currentMonth && isHpClient(r.client, r.name));
  const cnt = hpRecs.length;

  document.getElementById('hpCount').textContent = cnt;

  // コイン表示
  const coins = cnt > 0 ? '🪙'.repeat(Math.min(cnt, 8)) : '';
  document.getElementById('hpCoins').textContent = coins;

  // 増えたらチャリーン！
  if(cnt > prevHpCount && prevHpCount > 0){
    playCharin(cnt - prevHpCount);
  }
  prevHpCount = cnt;
}

function playCharin(times){
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if(!AudioCtx) return;
  const ctx = new AudioCtx();

  function happyCoin(startTime){
    const master = ctx.createGain();
    master.connect(ctx.destination);

    // ドレミ風に上昇する3音（うれしい！）
    const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const t = startTime + i * 0.07;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(master);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * 1.15, t + 0.12); // ★上がる！
      g.gain.setValueAtTime(0.0, t);
      g.gain.linearRampToValueAtTime(0.28, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    });

    // キラキラ感（高音の輝き）
    const sparkle = ctx.createOscillator();
    const sparkleG = ctx.createGain();
    sparkle.connect(sparkleG); sparkleG.connect(master);
    sparkle.type = 'sine';
    sparkle.frequency.setValueAtTime(2800, startTime + 0.18);
    sparkle.frequency.linearRampToValueAtTime(3800, startTime + 0.45); // ★さらに上へ
    sparkleG.gain.setValueAtTime(0.0, startTime + 0.18);
    sparkleG.gain.linearRampToValueAtTime(0.15, startTime + 0.22);
    sparkleG.gain.exponentialRampToValueAtTime(0.001, startTime + 0.55);
    sparkle.start(startTime + 0.18); sparkle.stop(startTime + 0.55);

    // ポーンとした弾む感じ
    const bounce = ctx.createOscillator();
    const bounceG = ctx.createGain();
    bounce.connect(bounceG); bounceG.connect(master);
    bounce.type = 'sine';
    bounce.frequency.setValueAtTime(400, startTime);
    bounce.frequency.exponentialRampToValueAtTime(900, startTime + 0.08); // ★ポーン↑
    bounceG.gain.setValueAtTime(0.22, startTime);
    bounceG.gain.exponentialRampToValueAtTime(0.001, startTime + 0.18);
    bounce.start(startTime); bounce.stop(startTime + 0.18);
  }

  const n = Math.min(times, 3);
  for(let i=0; i<n; i++){
    happyCoin(ctx.currentTime + i * 0.32);
  }
}

function showHpList(){
  const yr = MY[currentMonth]||2026;
  const hpRecs = records.filter(r => r.year===yr && r.month===currentMonth && isHpClient(r.client, r.name));
  const allHp = records.filter(r => isHpClient(r.client, r.name));

  // 今月分
  let html = `<div style="font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--dim);margin-bottom:8px;text-transform:uppercase">${yr}年${currentMonth}（${hpRecs.length}件）</div>`;
  hpRecs.forEach(r=>{
    const src = (r.client||'').replace(/^HP:?/i,'').trim()||'直接';
    html += `<div class="hp-row">
      <span class="hp-tag">HP</span>
      <span style="flex:1;font-weight:500">${r.name}</span>
      <span style="color:var(--muted);font-size:11px">${r.prefecture||''}</span>

      <span class="p-chip ${pc(r.person)}">${r.person||'—'}</span>

  });

  // 全期間集計

  allHp.forEach(r=>{ const k=`${r.year}/${r.month}`; byMonth[k]=(byMonth[k]||0)+1; });
  html += `<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--dim);margin-bottom:8px;text-transform:uppercase">全期間HP問い合わせ合計：${total}件</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,v])=>`<span style="background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.25);border-radius:4px;padding:3px 9px;font-size:11px"><span style="color:#ffd166;font-weight:700">${v}</span><span style="color:var(--muted);font-size:10px"> ${k}</span></span>`).join('')}
    </div>
  </div>`;

  document.getElementById('hpModalBody').innerHTML = html;
  document.getElementById('hpModalOv').classList.add('open');
}
